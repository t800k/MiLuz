<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Antony</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --gold-light: #FFF8C6;
            --gold-dark: #B8860B;
            --rose: #FF4081;
            --coral: #FF6B4A;
            --teal: #00E5CC;
            --bg-deep: #05040A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: var(--bg-deep);
            width: 100vw; height: 100vh;
            font-family: 'Playfair Display', serif;
        }
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #bgCanvas { z-index: 1; }
        #fwCanvas { z-index: 2; pointer-events: none; }
        #mainCanvas { z-index: 3; pointer-events: none; }

        .star-wrapper {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 4; cursor: pointer;
            transition: opacity 0.15s;
        }
        .star-wrapper.hidden { opacity: 0; pointer-events: none; }

        .star-halo-3 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.04) 0%, transparent 65%);
            animation: haloPulse 3s ease-in-out infinite;
        }
        .star-halo-2 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 340px; height: 340px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, rgba(255,180,0,0.03) 50%, transparent 70%);
            animation: haloPulse 2.5s ease-in-out infinite 0.4s;
        }
        .star-halo-1 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle, rgba(255,230,100,0.35) 0%, rgba(255,200,0,0.08) 50%, transparent 70%);
            animation: haloPulse 2s ease-in-out infinite 0.2s;
        }
        .star-rays-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            animation: raysSpin 15s linear infinite;
        }
        .star-rays-container-2 {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 320px; height: 320px;
            animation: raysSpin 10s linear infinite reverse;
        }
        .sray {
            position: absolute; top: 50%; left: 50%;
            transform-origin: top center;
            background: linear-gradient(to bottom, rgba(255,215,0,0.5), transparent);
            animation: rayGlow 2.5s ease-in-out infinite;
        }
        .star-core {
            position: relative; z-index: 2;
            animation: starFloat 3.5s ease-in-out infinite;
        }
        .star-svg {
            width: 150px; height: 150px;
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.9))
                    drop-shadow(0 0 40px rgba(255,200,0,0.5))
                    drop-shadow(0 0 80px rgba(255,180,0,0.3))
                    drop-shadow(0 0 120px rgba(255,160,0,0.15));
            animation: starSpin 10s linear infinite;
        }
        .orbit-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255,215,0,0.06);
            border-radius: 50%;
            animation: orbitSpin linear infinite;
        }
        .orbit-dot {
            position: absolute; width: 4px; height: 4px;
            background: var(--gold); border-radius: 50%;
            box-shadow: 0 0 8px var(--gold), 0 0 16px rgba(255,215,0,0.4);
        }
        .hint {
            position: fixed; bottom: 70px; left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            color: rgba(255,215,0,0.4);
            font-size: 13px; letter-spacing: 4px;
            text-transform: uppercase;
            animation: hintPulse 2.5s ease-in-out infinite;
            white-space: nowrap;
        }
        .hint.hidden { opacity: 0; transition: opacity 0.5s; }
        .flash-overlay {
            position: fixed; inset: 0;
            z-index: 20; pointer-events: none;
            opacity: 0; transition: opacity 0.08s;
        }
        .flash-overlay.fire {
            background: radial-gradient(circle at center, rgba(255,240,180,1) 0%, rgba(255,200,50,0.8) 30%, rgba(255,100,0,0.3) 60%, transparent 80%);
            opacity: 1;
        }
        .text-stage {
            position: fixed; inset: 0;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.6s ease;
        }
        .text-stage.show { opacity: 1; pointer-events: auto; }
        .line-top {
            width: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transition: width 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s;
            margin-bottom: 24px;
        }
        .text-stage.show .line-top { width: min(320px, 55vw); }
        .greeting {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(28px, 5vw, 52px);
            color: #FFF8E7;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
            transform: translateY(30px) scale(0.9);
            opacity: 0;
            transition: all 1s cubic-bezier(0.22,1,0.36,1) 0.5s;
            filter: drop-shadow(0 0 20px rgba(255,248,231,0.3));
        }
        .text-stage.show .greeting {
            transform: translateY(0) scale(1); opacity: 1;
        }
        .name {
            font-family: 'Great Vibes', cursive;
            font-weight: 400;
            font-size: clamp(56px, 12vw, 130px);
            line-height: 1.1;
            margin: 8px 0 16px;
            text-align: center;
            transform: translateY(50px) scale(0.7);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.175,0.885,0.32,1.275) 0.9s;
            color: transparent;
            background: linear-gradient(
                105deg,
                #8B6914 0%, #D4A017 10%, #FFF8C6 20%, #FFD700 30%,
                #B8860B 40%, #FFF3A0 50%, #FFD700 60%, #D4A017 70%,
                #FFF8C6 80%, #B8860B 90%, #8B6914 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: liquidGold 4s ease-in-out infinite;
            filter: drop-shadow(0 0 25px rgba(255,215,0,0.7))
                    drop-shadow(0 0 50px rgba(255,180,0,0.4))
                    drop-shadow(0 0 100px rgba(255,150,0,0.2));
        }
        .text-stage.show .name {
            transform: translateY(0) scale(1); opacity: 1;
        }
        .line-bottom {
            width: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            transition: width 1.2s cubic-bezier(0.22,1,0.36,1) 1.4s;
            margin-bottom: 20px;
        }
        .text-stage.show .line-bottom { width: min(320px, 55vw); }
        .submessage {
            font-family: 'Playfair Display', serif;
            font-size: clamp(12px, 2vw, 17px);
            color: rgba(255,248,231,0.5);
            letter-spacing: 5px;
            text-transform: uppercase;
            transform: translateY(20px); opacity: 0;
            transition: all 0.8s ease 1.7s;
        }
        .text-stage.show .submessage {
            transform: translateY(0); opacity: 1;
        }
        .year-badge {
            margin-top: 28px;
            padding: 8px 28px;
            border: 1px solid rgba(255,215,0,0.25);
            border-radius: 30px;
            font-size: clamp(11px, 1.5vw, 14px);
            color: rgba(255,215,0,0.6);
            letter-spacing: 4px;
            transform: translateY(15px); opacity: 0;
            transition: all 0.8s ease 2s;
            background: rgba(255,215,0,0.03);
        }
        .text-stage.show .year-badge {
            transform: translateY(0); opacity: 1;
        }
        .confetti-piece {
            position: fixed; top: -15px;
            z-index: 15; pointer-events: none;
        }

        @keyframes haloPulse {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%,-50%) scale(1.12); opacity: 1; }
        }
        @keyframes raysSpin {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to { transform: translate(-50%,-50%) rotate(360deg); }
        }
        @keyframes rayGlow {
            0%,100% { opacity: 0.25; }
            50% { opacity: 0.7; }
        }
        @keyframes starFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }
        @keyframes starSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes orbitSpin {
            from { transform: translate(-50%,-50%) rotate(0deg); }
            to { transform: translate(-50%,-50%) rotate(360deg); }
        }
        @keyframes hintPulse {
            0%,100% { opacity: 0.25; }
            50% { opacity: 0.55; }
        }
        @keyframes liquidGold {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg) rotateX(0deg); opacity: 1; }
            100% { transform: translateY(115vh) rotate(900deg) rotateX(360deg); opacity: 0; }
        }
        @keyframes sparkleUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            15% { transform: translateY(-10vh) scale(1); opacity: 1; }
            100% { transform: translateY(-110vh) scale(0.1); opacity: 0; }
        }

        @media (max-width: 600px) {
            .star-svg { width: 110px; height: 110px; }
            .star-halo-3 { width: 350px; height: 350px; }
            .star-halo-2 { width: 240px; height: 240px; }
            .star-halo-1 { width: 160px; height: 160px; }
            .star-rays-container { width: 280px; height: 280px; }
            .star-rays-container-2 { width: 220px; height: 220px; }
            .hint { font-size: 11px; bottom: 45px; }
        }
        @media (prefers-reduced-motion: reduce) {
            *,*::before,*::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="flash-overlay" id="flash"></div>
    <canvas id="bgCanvas"></canvas>
    <canvas id="fwCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>

    <div class="star-wrapper" id="starWrap" role="button" aria-label="Toca la estrella" tabindex="0">
        <div class="star-halo-3"></div>
        <div class="star-halo-2"></div>
        <div class="star-halo-1"></div>
        <div class="star-rays-container" id="rays1"></div>
        <div class="star-rays-container-2" id="rays2"></div>
        <div class="orbit-ring" style="width:280px;height:280px;animation-duration:6s;">
            <div class="orbit-dot" style="top:-2px;left:50%;"></div>
        </div>
        <div class="orbit-ring" style="width:350px;height:350px;animation-duration:9s;animation-direction:reverse;">
            <div class="orbit-dot" style="top:50%;right:-2px;width:3px;height:3px;"></div>
        </div>
        <div class="orbit-ring" style="width:200px;height:200px;animation-duration:4s;">
            <div class="orbit-dot" style="bottom:-2px;left:30%;width:3px;height:3px;"></div>
        </div>
        <div class="star-core">
            <svg class="star-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FFF8C6"/>
                        <stop offset="25%" stop-color="#FFD700"/>
                        <stop offset="50%" stop-color="#FFA500"/>
                        <stop offset="75%" stop-color="#FFD700"/>
                        <stop offset="100%" stop-color="#FFF3A0"/>
                    </linearGradient>
                </defs>
                <path d="M50 2 L62 36 L98 36 L69 57 L80 92 L50 72 L20 92 L31 57 L2 36 L38 36 Z" fill="url(#sg)"/>
            </svg>
        </div>
    </div>

    <p class="hint" id="hint">Toca la estrella</p>

    <div class="text-stage" id="textStage" aria-live="polite">
        <div class="line-top"></div>
        <div class="greeting">Feliz Cumpleaños</div>
        <div class="name">Luz</div>
        <div class="line-bottom"></div>
        <div class="submessage">Felices 19 amor mio. Que la vida te devuelva siempre toda la luz que tú entregas, porque eso eres, sin duda, alguien muy especial y profundamente querida. Gracias por existir❤️ 
</div>
        <div class="year-badge">06 / 04 / 2026</div>
    </div>

    <script>
    (() => {
        /* ===== REFERENCIAS A CANVASES ===== */
        var bgC = document.getElementById('bgCanvas');
        var bgX = bgC.getContext('2d');
        var fwC = document.getElementById('fwCanvas');
        var fwX = fwC.getContext('2d');
        var mnC = document.getElementById('mainCanvas');
        var mnX = mnC.getContext('2d');

        /* ===== VARIABLES DE ESTADO ===== */
        var W = 0, H = 0, CX = 0, CY = 0;
        var exploded = false;
        var t = 0;

        /* ===== COLORES (declarados ANTES de cualquier función que los use) ===== */
        var golds = ['#FFD700','#FFF8C6','#FFA500','#FFEC8B','#FFE4B5','#FFEFD5','#FFFFFF','#FFB347','#FFCC33','#D4A017'];
        var fwColors = ['#FFD700','#FF4081','#FF6B4A','#00E5CC','#7C4DFF','#FF9100','#E040FB','#00E676','#40C4FF','#FFFFFF'];

        /* ===== ARREGLOS DE PARTÍCULAS (declarados ANTES de resize) ===== */
        var bgStars = [];
        var fireworks = [];
        var fwSparks = [];
        var expParts = [];
        var shockwaves = [];
        var sparkleTrails = [];
        var fireRings = [];

        /* ===== NEBULOSAS ===== */
        var nebulae = [
            { x: 0.2, y: 0.3, rx: 0.25, ry: 0.2, color: 'rgba(255,64,129,0.015)', phase: 0 },
            { x: 0.8, y: 0.6, rx: 0.2, ry: 0.15, color: 'rgba(0,229,204,0.012)', phase: 1.5 },
            { x: 0.5, y: 0.15, rx: 0.3, ry: 0.12, color: 'rgba(255,215,0,0.018)', phase: 3 },
            { x: 0.7, y: 0.85, rx: 0.22, ry: 0.18, color: 'rgba(124,77,255,0.012)', phase: 4.5 }
        ];

        /* ===== INICIALIZAR ESTRELLAS DE FONDO ===== */
        function initStars() {
            var count = Math.min(350, Math.floor(W * H / 3500));
            bgStars = [];
            for (var i = 0; i < count; i++) {
                var bright = Math.random() < 0.04;
                bgStars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: bright ? (Math.random() * 3.5 + 2.5) : (Math.random() * 2.2 + 0.3),
                    baseA: bright ? (Math.random() * 0.3 + 0.5) : (Math.random() * 0.6 + 0.1),
                    speed: Math.random() * 0.025 + 0.004,
                    off: Math.random() * Math.PI * 2,
                    dx: (Math.random() - 0.5) * 0.15,
                    dy: (Math.random() - 0.5) * 0.1,
                    bright: bright,
                    col: golds[Math.floor(Math.random() * golds.length)]
                });
            }
        }

        /* ===== REDIMENSIONAR ===== */
        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            CX = W / 2;
            CY = H / 2;
            bgC.width = W; bgC.height = H;
            fwC.width = W; fwC.height = H;
            mnC.width = W; mnC.height = H;
            initStars();
        }
        resize();
        window.addEventListener('resize', resize);

        /* ===== CREAR RAYOS DE LA ESTRELLA ===== */
        function makeRays(container, count, longH, shortH, w) {
            for (var i = 0; i < count; i++) {
                var r = document.createElement('div');
                r.className = 'sray';
                var angle = (360 / count) * i;
                var h = i % 2 === 0 ? longH : shortH;
                r.style.cssText = 'transform:rotate(' + angle + 'deg);height:' + h + 'px;width:' + w + 'px;animation-delay:' + (i * 0.1) + 's;';
                container.appendChild(r);
            }
        }
        makeRays(document.getElementById('rays1'), 20, 160, 100, 1.5);
        makeRays(document.getElementById('rays2'), 14, 120, 70, 1);

        /* ===== DIBUJAR FONDO ===== */
        function drawBg() {
            bgX.clearRect(0, 0, W, H);
            var g = bgX.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.75);
            g.addColorStop(0, '#0F0D18');
            g.addColorStop(0.4, '#0A0812');
            g.addColorStop(1, '#04030A');
            bgX.fillStyle = g;
            bgX.fillRect(0, 0, W, H);

            // Nebulosas
            for (var n = 0; n < nebulae.length; n++) {
                var nb = nebulae[n];
                var nx = nb.x * W + Math.sin(t * 0.002 + nb.phase) * 30;
                var ny = nb.y * H + Math.cos(t * 0.0015 + nb.phase) * 20;
                bgX.save();
                bgX.translate(nx, ny);
                bgX.scale(nb.rx, nb.ry);
                var ng = bgX.createRadialGradient(0, 0, 0, 0, 0, 1);
                ng.addColorStop(0, nb.color);
                ng.addColorStop(1, 'rgba(0,0,0,0)');
                bgX.fillStyle = ng;
                bgX.beginPath();
                bgX.arc(0, 0, 1, 0, Math.PI * 2);
                bgX.fill();
                bgX.restore();
            }

            // Estrellas
            for (var i = 0; i < bgStars.length; i++) {
                var s = bgStars[i];
                var tw = Math.sin(t * s.speed + s.off);
                var a = s.baseA * (0.4 + 0.6 * tw);
                s.x += s.dx; s.y += s.dy;
                if (s.x < -20) s.x = W + 20;
                if (s.x > W + 20) s.x = -20;
                if (s.y < -20) s.y = H + 20;
                if (s.y > H + 20) s.y = -20;

                bgX.save();
                bgX.globalAlpha = Math.max(0, a);

                if (s.bright) {
                    var hg = bgX.createRadialGradient(s.x, s.y, 0, s.x, s.y, Math.max(1, s.r * 5));
                    hg.addColorStop(0, s.col);
                    hg.addColorStop(0.25, s.col);
                    hg.addColorStop(1, 'rgba(0,0,0,0)');
                    bgX.fillStyle = hg;
                    bgX.beginPath();
                    bgX.arc(s.x, s.y, Math.max(1, s.r * 5), 0, Math.PI * 2);
                    bgX.fill();
                    bgX.strokeStyle = s.col;
                    bgX.lineWidth = 0.4;
                    bgX.globalAlpha = Math.max(0, a * 0.4);
                    var cs = s.r * 7;
                    bgX.beginPath();
                    bgX.moveTo(s.x - cs, s.y); bgX.lineTo(s.x + cs, s.y);
                    bgX.moveTo(s.x, s.y - cs); bgX.lineTo(s.x, s.y + cs);
                    bgX.stroke();
                    bgX.globalAlpha = Math.max(0, a);
                }

                bgX.fillStyle = s.col;
                bgX.beginPath();
                bgX.arc(s.x, s.y, Math.max(0.2, s.r), 0, Math.PI * 2);
                bgX.fill();
                bgX.restore();
            }
        }

        /* ===== FUEGOS ARTIFICIALES ===== */
        function Firework() {
            this.x = Math.random() * W;
            this.y = H + 10;
            this.targetY = Math.random() * H * 0.4 + H * 0.1;
            this.vy = -(Math.random() * 4 + 5);
            this.color = fwColors[Math.floor(Math.random() * fwColors.length)];
            this.trail = [];
            this.alive = true;
        }
        Firework.prototype.update = function() {
            this.trail.push({ x: this.x, y: this.y, a: 1 });
            if (this.trail.length > 12) this.trail.shift();
            this.y += this.vy;
            this.vy *= 0.985;
            this.x += (Math.random() - 0.5) * 0.5;
            if (this.y <= this.targetY) {
                this.alive = false;
                this.burst();
            }
            for (var i = 0; i < this.trail.length; i++) this.trail[i].a *= 0.88;
        };
        Firework.prototype.burst = function() {
            var count = Math.floor(Math.random() * 40 + 50);
            for (var i = 0; i < count; i++) {
                var angle = (Math.PI * 2 / count) * i + Math.random() * 0.2;
                var speed = Math.random() * 4 + 1.5;
                fwSparks.push({
                    x: this.x, y: this.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    a: 1,
                    decay: Math.random() * 0.018 + 0.008,
                    color: this.color,
                    r: Math.random() * 2.5 + 0.5,
                    grav: 0.03,
                    trail: []
                });
            }
        };
        Firework.prototype.draw = function(ctx) {
            for (var i = 0; i < this.trail.length; i++) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.trail[i].a * 0.6);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.trail[i].x, this.trail[i].y, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        };

        function drawFireworks() {
            fwX.clearRect(0, 0, W, H);

            if (t % 90 === 0 && (Math.random() < 0.6 || exploded)) {
                fireworks.push(new Firework());
                if (exploded && Math.random() < 0.5) fireworks.push(new Firework());
            }

            for (var i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw(fwX);
                if (!fireworks[i].alive) fireworks.splice(i, 1);
            }

            for (var i = fwSparks.length - 1; i >= 0; i--) {
                var s = fwSparks[i];
                s.trail.push({ x: s.x, y: s.y, a: s.a });
                if (s.trail.length > 5) s.trail.shift();
                s.vx *= 0.97; s.vy *= 0.97;
                s.vy += s.grav;
                s.x += s.vx; s.y += s.vy;
                s.a -= s.decay;

                for (var j = 0; j < s.trail.length; j++) {
                    fwX.save();
                    fwX.globalAlpha = Math.max(0, s.trail[j].a * 0.3);
                    fwX.fillStyle = s.color;
                    fwX.beginPath();
                    fwX.arc(s.trail[j].x, s.trail[j].y, Math.max(0.3, s.r * 0.5), 0, Math.PI * 2);
                    fwX.fill();
                    fwX.restore();
                }

                fwX.save();
                fwX.globalAlpha = Math.max(0, s.a);
                fwX.fillStyle = s.color;
                fwX.shadowColor = s.color;
                fwX.shadowBlur = 8;
                fwX.beginPath();
                fwX.arc(s.x, s.y, Math.max(0.3, s.r), 0, Math.PI * 2);
                fwX.fill();
                fwX.restore();

                if (s.a <= 0) fwSparks.splice(i, 1);
            }
        }

        /* ===== PARTÍCULAS DE EXPLOSIÓN ===== */
        function ExpPart(x, y, layer) {
            this.x = x; this.y = y;
            var angle = Math.random() * Math.PI * 2;
            var speed = layer === 0 ? (Math.random() * 16 + 4) :
                        layer === 1 ? (Math.random() * 10 + 2) :
                        (Math.random() * 6 + 1);
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.r = layer === 0 ? (Math.random() * 5 + 2) :
                     layer === 1 ? (Math.random() * 3 + 1) :
                     (Math.random() * 2 + 0.5);
            this.a = 1;
            this.decay = layer === 0 ? (Math.random() * 0.008 + 0.004) :
                         layer === 1 ? (Math.random() * 0.012 + 0.006) :
                         (Math.random() * 0.02 + 0.01);
            this.col = golds[Math.floor(Math.random() * golds.length)];
            this.grav = layer === 0 ? 0.02 : 0.035;
            this.fric = 0.988;
            this.type = (layer === 0 && Math.random() < 0.3) ? 1 :
                        (layer === 0 && Math.random() < 0.1) ? 2 : 0;
            this.trail = [];
        }
        ExpPart.prototype.update = function() {
            if (this.type === 1) {
                this.trail.push({ x: this.x, y: this.y, a: this.a });
                if (this.trail.length > 10) this.trail.shift();
            }
            this.vx *= this.fric; this.vy *= this.fric;
            this.vy += this.grav;
            this.x += this.vx; this.y += this.vy;
            this.a -= this.decay;
            this.r *= 0.999;
        };
        ExpPart.prototype.draw = function(ctx) {
            if (this.a <= 0) return;
            ctx.save();
            if (this.trail.length > 1) {
                ctx.strokeStyle = this.col;
                ctx.lineWidth = Math.max(0.3, this.r * 0.4);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for (var i = 1; i < this.trail.length; i++) {
                    ctx.globalAlpha = Math.max(0, this.trail[i].a * 0.3);
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = Math.max(0, this.a);
            if (this.type === 2) {
                var rg = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, Math.max(1, this.r * 4));
                rg.addColorStop(0, '#FFFFFF');
                rg.addColorStop(0.2, this.col);
                rg.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = rg;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(1, this.r * 4), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = this.col;
            ctx.shadowColor = this.col;
            ctx.shadowBlur = this.type === 2 ? 20 : 8;
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.max(0.2, this.r), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        };

        /* ===== ONDAS DE CHOQUE ===== */
        function Shockwave(x, y, maxR, speed, col) {
            this.x = x; this.y = y;
            this.r = 0; this.maxR = maxR;
            this.speed = speed; this.a = 0.9;
            this.lw = 3; this.col = col || '#FFD700';
        }
        Shockwave.prototype.update = function() {
            this.r += this.speed;
            this.speed *= 0.98;
            this.a *= 0.97;
            this.lw *= 0.98;
        };
        Shockwave.prototype.draw = function(ctx) {
            if (this.a < 0.005) return;
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.a);
            ctx.strokeStyle = this.col;
            ctx.lineWidth = Math.max(0.5, this.lw);
            ctx.shadowColor = this.col;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(this.x, this.y, Math.max(1, this.r), 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        };
        Shockwave.prototype.dead = function() {
            return this.a < 0.005 || this.r > this.maxR;
        };

        /* ===== ANILLO DE FUEGO ===== */
        function FireRing(x, y) {
            this.x = x; this.y = y;
            this.r = 10; this.a = 1;
            this.parts = [];
            var count = 120;
            for (var i = 0; i < count; i++) {
                var angle = (Math.PI * 2 / count) * i;
                this.parts.push({
                    angle: angle, dist: 0,
                    speed: Math.random() * 3 + 5,
                    r: Math.random() * 3 + 1,
                    a: 1,
                    decay: Math.random() * 0.008 + 0.005,
                    col: golds[Math.floor(Math.random() * golds.length)],
                    spread: (Math.random() - 0.5) * 0.5
                });
            }
        }
        FireRing.prototype.update = function() {
            this.r += 3;
            this.a *= 0.98;
            for (var i = 0; i < this.parts.length; i++) {
                var p = this.parts[i];
                p.dist += p.speed;
                p.speed *= 0.97;
                p.angle += p.spread * 0.02;
                p.a -= p.decay;
            }
        };
        FireRing.prototype.draw = function(ctx) {
            for (var i = 0; i < this.parts.length; i++) {
                var p = this.parts[i];
                if (p.a <= 0) continue;
                var px = this.x + Math.cos(p.angle) * (this.r + p.dist);
                var py = this.y + Math.sin(p.angle) * (this.r + p.dist);
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.a * this.a);
                ctx.fillStyle = p.col;
                ctx.shadowColor = p.col;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(px, py, Math.max(0.3, p.r), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        };
        FireRing.prototype.dead = function() { return this.a < 0.01; };

        /* ===== DIBUJAR EXPLOSIÓN PRINCIPAL ===== */
        function drawMainExplosion() {
            mnX.clearRect(0, 0, W, H);

            var i;
            for (i = shockwaves.length - 1; i >= 0; i--) {
                shockwaves[i].update();
                shockwaves[i].draw(mnX);
                if (shockwaves[i].dead()) shockwaves.splice(i, 1);
            }
            for (i = fireRings.length - 1; i >= 0; i--) {
                fireRings[i].update();
                fireRings[i].draw(mnX);
                if (fireRings[i].dead()) fireRings.splice(i, 1);
            }
            for (i = expParts.length - 1; i >= 0; i--) {
                expParts[i].update();
                expParts[i].draw(mnX);
                if (expParts[i].a <= 0) expParts.splice(i, 1);
            }

            // Sparkles ascendentes post-explosión
            for (i = sparkleTrails.length - 1; i >= 0; i--) {
                var s = sparkleTrails[i];
                s.y -= s.vy;
                s.x += Math.sin(t * 0.02 + s.off) * 0.5;
                s.a -= 0.003;
                s.r *= 0.998;
                mnX.save();
                mnX.globalAlpha = Math.max(0, s.a);
                var sg = mnX.createRadialGradient(s.x, s.y, 0, s.x, s.y, Math.max(1, s.r * 3));
                sg.addColorStop(0, '#FFFFFF');
                sg.addColorStop(0.3, s.col);
                sg.addColorStop(1, 'rgba(0,0,0,0)');
                mnX.fillStyle = sg;
                mnX.beginPath();
                mnX.arc(s.x, s.y, Math.max(1, s.r * 3), 0, Math.PI * 2);
                mnX.fill();
                mnX.restore();
                if (s.a <= 0) sparkleTrails.splice(i, 1);
            }
        }

        /* ===== CONFETI ===== */
        function confettiBurst() {
            var colors = ['#FFD700','#FF4081','#00E5CC','#FF6B4A','#7C4DFF','#FF9100','#E040FB','#00E676','#FFFFFF','#FFEC8B'];
            for (var i = 0; i < 100; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var el = document.createElement('div');
                        el.className = 'confetti-piece';
                        var shapes = ['circle','rect','strip','diamond'];
                        var shape = shapes[Math.floor(Math.random() * shapes.length)];
                        var col = colors[Math.floor(Math.random() * colors.length)];
                        var sz = Math.random() * 10 + 4;
                        el.style.left = Math.random() * 100 + 'vw';
                        el.style.width = sz + 'px';
                        el.style.height = (shape === 'strip' ? sz * 2.5 : sz) + 'px';
                        el.style.backgroundColor = col;
                        el.style.borderRadius = shape === 'circle' ? '50%' : '2px';
                        if (shape === 'diamond') el.style.transform = 'rotate(45deg)';
                        el.style.animation = 'confettiFall ' + (Math.random() * 3 + 3.5) + 's linear forwards';
                        el.style.opacity = String(Math.random() * 0.4 + 0.6);
                        el.style.boxShadow = '0 0 6px ' + col;
                        document.body.appendChild(el);
                        setTimeout(function() { el.remove(); }, 7000);
                    }, Math.random() * 2000);
                })(i);
            }
        }

        function sparkleUpBurst() {
            for (var i = 0; i < 40; i++) {
                (function(idx) {
                    setTimeout(function() {
                        var el = document.createElement('div');
                        el.className = 'confetti-piece';
                        var sz = Math.random() * 5 + 2;
                        var col = golds[Math.floor(Math.random() * golds.length)];
                        el.style.left = Math.random() * 100 + 'vw';
                        el.style.bottom = '-10px';
                        el.style.width = sz + 'px';
                        el.style.height = sz + 'px';
                        el.style.backgroundColor = col;
                        el.style.borderRadius = '50%';
                        el.style.boxShadow = '0 0 ' + (sz * 3) + 'px ' + col;
                        el.style.animation = 'sparkleUp ' + (Math.random() * 5 + 5) + 's linear forwards';
                        document.body.appendChild(el);
                        setTimeout(function() { el.remove(); }, 10000);
                    }, Math.random() * 4000);
                })(i);
            }
        }

        /* ===== EXPLOSIÓN PRINCIPAL ===== */
        var flash = document.getElementById('flash');
        var starWrap = document.getElementById('starWrap');
        var hint = document.getElementById('hint');
        var textStage = document.getElementById('textStage');

        function explode() {
            if (exploded) return;
            exploded = true;

            flash.classList.add('fire');
            setTimeout(function() { flash.classList.remove('fire'); }, 350);

            starWrap.classList.add('hidden');
            hint.classList.add('hidden');

            // Ondas de choque
            shockwaves.push(new Shockwave(CX, CY, Math.max(W, H), 14, '#FFD700'));
            setTimeout(function() { shockwaves.push(new Shockwave(CX, CY, Math.max(W, H) * 0.9, 11, '#FFF8C6')); }, 100);
            setTimeout(function() { shockwaves.push(new Shockwave(CX, CY, Math.max(W, H) * 0.8, 8, '#FFA500')); }, 200);
            setTimeout(function() { shockwaves.push(new Shockwave(CX, CY, Math.max(W, H) * 0.7, 6, '#FFFFFF')); }, 350);

            // Anillos de fuego
            fireRings.push(new FireRing(CX, CY));
            setTimeout(function() { fireRings.push(new FireRing(CX, CY)); }, 200);
            setTimeout(function() { fireRings.push(new FireRing(CX, CY)); }, 400);

            // Partículas en 3 capas
            var maxP = Math.min(600, Math.floor(W * H / 3000));
            for (var i = 0; i < maxP; i++) expParts.push(new ExpPart(CX, CY, 0));
            setTimeout(function() {
                for (var j = 0; j < 200; j++) expParts.push(new ExpPart(CX, CY, 1));
            }, 150);
            setTimeout(function() {
                for (var k = 0; k < 150; k++) expParts.push(new ExpPart(CX, CY, 2));
            }, 350);

            // Fuegos artificiales inmediatos
            for (var f = 0; f < 5; f++) {
                (function(delay) {
                    setTimeout(function() { fireworks.push(new Firework()); }, delay);
                })(f * 200);
            }

            // Sparkles ascendentes
            setTimeout(function() {
                for (var sp = 0; sp < 50; sp++) {
                    sparkleTrails.push({
                        x: CX + (Math.random() - 0.5) * W * 0.6,
                        y: CY + (Math.random() - 0.5) * H * 0.6,
                        vy: Math.random() * 1.5 + 0.5,
                        r: Math.random() * 3 + 1,
                        a: Math.random() * 0.5 + 0.4,
                        col: golds[Math.floor(Math.random() * golds.length)],
                        off: Math.random() * Math.PI * 2
                    });
                }
            }, 1000);

            // Mostrar texto
            setTimeout(function() { textStage.classList.add('show'); }, 900);

            // Confeti
            setTimeout(confettiBurst, 500);
            setTimeout(confettiBurst, 2200);
            setTimeout(sparkleUpBurst, 1800);
        }

        /* ===== EVENTOS ===== */
        starWrap.addEventListener('click', explode);
        starWrap.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); explode(); }
        });
        setTimeout(function() { if (!exploded) explode(); }, 4500);

        /* ===== BUCLE PRINCIPAL ===== */
        function loop() {
            t++;
            requestAnimationFrame(loop);
            drawBg();
            drawFireworks();
            drawMainExplosion();
        }
        loop();
    })();
    </script>
